version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: urbanhub_postgres
    environment:
      POSTGRES_DB: urbanhub
      POSTGRES_USER: urbanhub_user
      POSTGRES_PASSWORD: urbanhub_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanhub_user -d urbanhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: urbanhub_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: urbanhub_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@urbanhub.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  referential:
    build:
      context: ./services/referential-service
      dockerfile: Dockerfile
    container_name: referential_service
    ports:
      - "8001:8001"
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      - postgres


  notification:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification_service
    environment:
      RABBIT_HOST: rabbitmq
    depends_on:
      - rabbitmq


  ingestion:
    build:
      context: ./services/ingestion-service
      dockerfile: Dockerfile
    environment:
      VALIDATION_SERVICE_URL: http://validation:8002
    ports:
      - "8000:8000"
    depends_on:
      - validation
      - rabbitmq
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  validation:
    build:
      context: ./services/validation-service
      dockerfile: Dockerfile
    environment:
      RABBIT_HOST: rabbitmq
    ports:
      - "8002:8002"
    depends_on:
      - rabbitmq
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  association:
    build:
      context: ./services/association-service
      dockerfile: Dockerfile
    environment:
      RABBIT_HOST: rabbitmq
    depends_on:
      - rabbitmq
    command: python src/subscriber.py

  analyse:
    build:
      context: ./services/analyse-service
      dockerfile: Dockerfile
    environment:
      RABBIT_HOST: rabbitmq
      POSTGRES_HOST: postgres
    ports:
      - "8003:8003"
    depends_on:
      - rabbitmq
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload

volumes:
  postgres_data:
  rabbitmq_data: