name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: urbanhub_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      rabbitmq:
        image: rabbitmq:3.13
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5672:5672

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Api_ingestion/requirements.txt
          pip install -r MoteurCorrelation/requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 Api_ingestion --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 MoteurCorrelation --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: |
          pytest MoteurCorrelation/tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker images
        run: |
          docker build -f Api_ingestion/Dockerfile -t urbanhub-api:latest .
          docker build -f MoteurCorrelation/Dockerfile -t urbanhub-moteur:latest .

      - name: Test Docker Compose
        run: |
          docker-compose config